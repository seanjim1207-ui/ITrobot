<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Po波</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='wg' x1='0' y1='32' x2='64' y2='32' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0%25' stop-color='%23e8734a'/%3E%3Cstop offset='50%25' stop-color='%23f4956c'/%3E%3Cstop offset='100%25' stop-color='%23e8734a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='30' fill='%23faf6f0'/%3E%3Cpath d='M8 32 C16 16, 24 16, 32 32 S48 48, 56 32' fill='none' stroke='url(%23wg)' stroke-width='4.5' stroke-linecap='round'/%3E%3Ccircle cx='56' cy='32' r='3.5' fill='%23e8734a'/%3E%3Ccircle cx='56' cy='32' r='6' fill='none' stroke='%23e8734a' opacity='0.25' stroke-width='1.5'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css?v=18">
</head>
<body>
  <!-- 背景光暈 -->
  <div class="ambient-bg">
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>
  </div>

  <div class="chat-app">
    <!-- 左側邊欄：影片 + 對話列表 -->
    <aside class="sidebar" id="sidebar">
      <!-- 莫比烏斯帶 Möbius Strip -->
      <div class="mobius-panel" id="mobius-panel">
        <canvas class="mobius-canvas" id="mobius-canvas"></canvas>
      </div>

      <div class="sidebar-section-title">知識庫</div>
      <div class="docs-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="docs-search" placeholder="搜尋文件…" />
      </div>
      <div class="sidebar-list" id="docs-list"></div>

      <div class="sidebar-bottom">
        <div class="model-badge" id="ollama-status" data-status="checking">
          <span class="model-dot"></span>
          <span id="model-name">檢查中…</span>
        </div>
      </div>
    </aside>

    <!-- 主聊天區 -->
    <div class="chat-main">
      <!-- 頂部列 -->
      <header class="topbar">
        <button class="toggle-btn" id="toggle-sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <span class="topbar-title">工作交接問答</span>
        <button class="mode-btn" id="mode-btn" data-mode="chat">
          <svg class="mode-icon icon-docs" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <svg class="mode-icon icon-chat" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span class="mode-label">文件</span>
        </button>
      </header>

      <!-- 文件閱讀器 -->
      <div class="doc-viewer hidden" id="doc-viewer">
        <div class="doc-viewer-header">
          <span class="doc-viewer-title" id="doc-viewer-title"></span>
        </div>
        <div class="doc-viewer-body" id="doc-viewer-body"></div>
      </div>

      <!-- 訊息容器 -->
      <div class="chat-scroll" id="chat-scroll">
        <!-- 歡迎畫面 -->
        <div class="welcome" id="welcome">
          <div class="samantha-ring">
            <div class="ring-inner"></div>
          </div>
          <h2>Hi，我是波</h2>
          <p>關於工作交接的任何問題，都可以問我</p>
          <div class="suggestions">
            <button class="suggest-btn" data-q="這個專案的技術架構是什麼？">專案架構</button>
            <button class="suggest-btn" data-q="部署流程怎麼操作？">部署流程</button>
            <button class="suggest-btn" data-q="帳號權限怎麼申請？">帳號權限</button>
          </div>
        </div>

        <!-- 訊息列表 -->
        <div class="messages" id="messages"></div>
      </div>

      <!-- 輸入區 -->
      <div class="input-area">
        <div class="particles" id="particles"></div>
        <div class="input-box" id="input-box">
          <textarea id="user-input" placeholder="想問什麼..." rows="1"></textarea>
          <button class="send-btn" id="send-btn" disabled>
            <svg class="icon-send" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
            <svg class="icon-stop" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <rect x="5" y="5" width="14" height="14" rx="2"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">Enter 送出 / Shift+Enter 換行</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/app.js?v=15"></script>
</body>
</html>
